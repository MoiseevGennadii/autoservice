<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея работ - тонировка, химчистка, покраска авто в Минске сокол</title>

    <!-- Favicon из папки favicon_io -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <link rel="shortcut icon" href="favicon_io/favicon.ico">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f6f8fa;
            color: #1e2b3c;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .header h1 i {
            color: #2b7a4b;
            font-size: 2.2rem;
        }

        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid #dde2e8;
            padding-bottom: 12px;
            justify-content: center;
        }

        .nav-link {
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            color: #4a5f73;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-link:hover {
            background: #e9eef3;
        }

        .nav-link.active {
            background: #ffffff;
            color: #0f5b3a;
            box-shadow: 0 2px 8px rgba(15, 91, 58, 0.15);
        }

        .content-card {
            background: white;
            border-radius: 32px;
            padding: 36px 32px;
            box-shadow: 0 15px 40px -12px rgba(0, 32, 64, 0.12);
            margin-top: 24px;
        }

        /* Галерея */
        .gallery-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .gallery-tab {
            padding: 10px 20px;
            background: #f0f5fa;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: #4a5f73;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery-tab.active {
            background: #0f5b3a;
            color: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            background: #f5faff;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #dee9f2;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: #0f5b3a;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-item p {
            padding: 15px;
            font-weight: 600;
            text-align: center;
            background: white;
        }

        /* Модальное окно */
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 95%;
            max-height: 95%;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для изображений */
        .modal-images {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            /* Важно для flexbox */
        }

        /* Для одиночного фото */
        .modal-images.single img {
            max-width: 100%;
            max-height: 80vh;
            width: auto;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Для пары фото */
        .modal-images:not(.single) img {
            max-width: calc(50% - 8px);
            max-height: 70vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #1a1a1a;
        }

        /* Кнопка закрытия */
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            z-index: 1001;
            line-height: 1;
        }

        /* Подпись под фото */
        .modal-caption {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            padding: 0 10px;
        }

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .modal-content {
                max-width: 100%;
                max-height: 100%;
                width: 100%;
                padding: 10px 0;
            }

            .modal-images {
                flex-direction: column;
                gap: 10px;
                height: auto;
                max-height: calc(100vh - 100px);
                overflow-y: auto;
                /* Добавляем прокрутку если нужно */
                padding: 10px 0;
            }

            /* Для пары фото на мобильных */
            .modal-images:not(.single) img {
                max-width: 95%;
                max-height: 45vh;
                /* Каждое фото занимает меньше половины экрана */
                width: auto;
                height: auto;
            }

            /* Для одиночного фото на мобильных */
            .modal-images.single img {
                max-width: 100%;
                max-height: 70vh;
            }

            .close-modal {
                top: 5px;
                right: 10px;
                background: rgba(0, 0, 0, 0.6);
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.2rem;
                line-height: 1;
            }

            .modal-caption {
                font-size: 1rem;
                margin-top: 10px;
                padding: 0 15px 10px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .modal-images:not(.single) img {
                max-height: 40vh;
            }

            .modal-images.single img {
                max-height: 65vh;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1
                style="display: flex; align-items: center; justify-content: center; gap: 12px; text-align: center; width: 100%;">
                <i class="fas fa-car"></i> AutoService в Минске
            </h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="tonirovka.html" class="nav-link"><i class="fas fa-car-side"></i> Тонировка</a>
                <a href="himchistka.html" class="nav-link"><i class="fas fa-water"></i> Химчистка</a>
                <a href="polirovka-far.html" class="nav-link"><i class="fas fa-lightbulb"></i> Полировка фар</a>
                <a href="pokraska.html" class="nav-link"><i class="fas fa-paint-brush"></i> Покраска</a>
                <a href="gallery.html" class="nav-link active"><i class="fas fa-images"></i> Галерея</a>
                <a href="contacts.html" class="nav-link"><i class="fas fa-map-pin"></i> Контакты</a>
            </nav>
        </div>

        <div class="content-card">
            <h2 style="text-align: center; margin-bottom: 30px;">Наши работы</h2>

            <div class="gallery-tabs">
                <button class="gallery-tab active" onclick="filterGallery('all')">Все</button>
                <button class="gallery-tab" onclick="filterGallery('tonirovka')">Тонировка</button>
                <button class="gallery-tab" onclick="filterGallery('himchistka')">Химчистка</button>
                <button class="gallery-tab" onclick="filterGallery('polirovka')">Полировка фар</button>
                <button class="gallery-tab" onclick="filterGallery('pokraska')">Покраска</button>
            </div>

            <!-- Галерея будет заполнена автоматически из images.js -->
            <div class="gallery-grid" id="gallery-grid"></div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>

        <!-- Модальное окно -->
        <div id="modal" class="modal" onclick="closeModal(event)">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal(event)">&times;</span>
                <div id="modal-images" class="modal-images"></div>
                <div id="modal-caption" class="modal-caption"></div>
            </div>
        </div>

        <div class="footer-note"
            style="text-align: center; margin-top: 40px; padding: 20px 0; border-top: 1px solid #d7e0e9; color: #556f84; font-size: 0.9rem;">
            <i class="fas fa-images" style="margin-right: 6px; color: #0f5b3a;"></i>
            Галерея работ AutoService в Минске
        </div>
    </div>

    <!-- Подключаем данные галереи -->
    <script src="images.js"></script>

    <script>
        // Функция фильтрации
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            const tabs = document.querySelectorAll('.gallery-tab');

            tabs.forEach(tab => {
                if (tab.textContent.toLowerCase().includes(category) || (category === 'all' && tab.textContent === 'Все')) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            items.forEach(item => {
                if (category === 'all' || item.dataset.category === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Функция открытия модального окна с поддержкой нескольких фото
        function openModal(files, caption) {
            const modal = document.getElementById('modal');
            const modalContent = document.querySelector('.modal-content');
            const modalImages = document.getElementById('modal-images');
            const modalCaption = document.getElementById('modal-caption');

            // Очищаем контейнер
            modalImages.innerHTML = '';

            // Устанавливаем класс в зависимости от количества фото
            if (files.length === 2) {
                modalImages.className = 'modal-images';
            } else {
                modalImages.className = 'modal-images single';
            }

            // Добавляем все фото
            files.forEach(file => {
                const img = document.createElement('img');
                img.src = 'img/' + file;
                img.alt = caption;
                modalImages.appendChild(img);
            });

            modalCaption.textContent = caption;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Функция закрытия модального окна
        function closeModal(event) {
            if (event.target === document.getElementById('modal') || event.target.classList.contains('close-modal')) {
                document.getElementById('modal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Функция отрисовки галереи из images.js
        function renderGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            galleryGrid.innerHTML = ''; // Очищаем галерею

            // Проходим по всем категориям
            for (const [category, items] of Object.entries(galleryImages)) {
                items.forEach((item, index) => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item';
                    galleryItem.dataset.category = category;

                    // Используем первое фото как превью
                    const previewFile = item.files[0];
                    galleryItem.onclick = () => openModal(item.files, item.caption);

                    // Добавляем иконку фотоаппарата для пар "до/после"
                    const photoIcon = item.files.length === 2 ? ' 📸' : '';

                    galleryItem.innerHTML = `
          <img src="img/${previewFile}" alt="${item.caption}">
          <p>${item.caption}${photoIcon}</p>
        `;

                    galleryGrid.appendChild(galleryItem);
                });
            }

            // Показываем все фото
            filterGallery('all');
        }

        // Запускаем отрисовку при загрузке страницы
        renderGallery();
    </script>
</body>

</html>
