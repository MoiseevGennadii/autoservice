<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покраска авто в Минске сокол</title>

    <!-- Favicon из папки favicon_io -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <link rel="shortcut icon" href="favicon_io/favicon.ico">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Sitemap ссылка -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="https://autominsk.vercel.app/sitemap.xml">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f6f8fa;
            color: #1e2b3c;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .header h1 i {
            color: #2b7a4b;
            font-size: 2.2rem;
        }

        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid #dde2e8;
            padding-bottom: 12px;
            justify-content: center;
        }

        .nav-link {
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            color: #4a5f73;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-link:hover {
            background: #e9eef3;
        }

        .nav-link.active {
            background: #ffffff;
            color: #0f5b3a;
            box-shadow: 0 2px 8px rgba(15, 91, 58, 0.15);
        }

        .content-card {
            background: white;
            border-radius: 32px;
            padding: 36px 32px;
            box-shadow: 0 15px 40px -12px rgba(0, 32, 64, 0.12);
            margin-top: 24px;
        }

        /* Галерея */
        .gallery-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .gallery-tab {
            padding: 10px 20px;
            background: #f0f5fa;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            color: #4a5f73;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery-tab.active {
            background: #0f5b3a;
            color: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            background: #f5faff;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #dee9f2;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: #0f5b3a;
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-item p {
            padding: 15px;
            font-weight: 600;
            text-align: center;
            background: white;
        }

        /* Модальное окно (основное) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        /* Контейнер для изображений - ОДНА КОЛОНКА */
        .modal-images {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 10px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }

        /* Контейнер для отдельной пары фото */
        .photo-pair {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            width: 100%;
        }

        /* Контейнер для изображений внутри пары */
        .photo-pair .images-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        /* Стили для всех изображений */
        .photo-pair img {
            width: 100%;
            height: auto;
            max-height: 40vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #1a1a1a;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .photo-pair img:active {
            transform: scale(0.98);
        }

        /* Подписи ДО/ПОСЛЕ */
        .pair-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0 5px;
        }

        .pair-label span:first-child {
            color: #ffa500;
            background: rgba(255, 165, 0, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .pair-label span:last-child {
            color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Разделитель между парами */
        .pair-divider {
            text-align: center;
            color: #888;
            font-size: 1rem;
            margin: 10px 0;
            position: relative;
        }

        .pair-divider::before,
        .pair-divider::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: #444;
            margin: 0 10px;
            vertical-align: middle;
        }

        /* Кнопка закрытия основного модального окна */
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            z-index: 1001;
            line-height: 1;
            background: rgba(0, 0, 0, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Подпись под фото (основная) */
        .modal-caption {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            padding: 0 10px;
            flex-shrink: 0;
        }

        /* Второе модальное окно для увеличенного фото */
        .zoom-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .zoom-modal.active {
            display: flex;
        }

        .zoom-content {
            position: relative;
            max-width: 95%;
            max-height: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .zoom-content img {
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        .zoom-caption {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            padding: 0 10px;
        }

        .close-zoom {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            z-index: 2001;
            line-height: 1;
            background: rgba(0, 0, 0, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-zoom:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Кнопка "На главную" */
        .back-link {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #0f5b3a;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
        }

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .modal-content {
                max-width: 100%;
            }

            .photo-pair .images-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .photo-pair img {
                max-height: 35vh;
            }

            .close-modal {
                top: 5px;
                right: 5px;
                width: 40px;
                height: 40px;
                font-size: 2rem;
            }

            .close-zoom {
                top: 5px;
                right: 5px;
                width: 40px;
                height: 40px;
                font-size: 2rem;
            }
        }

        @media (max-width: 550px) {
            .app {
                padding: 12px;
            }

            .content-card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <h1
                style="display: flex; align-items: center; justify-content: center; gap: 12px; text-align: center; width: 100%;">
                <i class="fas fa-car"></i> СТО в Соколе Минск
            </h1>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="tonirovka.html" class="nav-link"><i class="fas fa-car-side"></i> Тонировка</a>
                <a href="himchistka.html" class="nav-link"><i class="fas fa-water"></i> Химчистка</a>
                <a href="polirovka-far.html" class="nav-link"><i class="fas fa-lightbulb"></i> Полировка фар</a>
                <a href="pokraska.html" class="nav-link"><i class="fas fa-paint-brush"></i> Покраска</a>
                <a href="gallery.html" class="nav-link active"><i class="fas fa-images"></i> Галерея</a>
                <a href="contacts.html" class="nav-link"><i class="fas fa-map-pin"></i> Контакты</a>
            </nav>
        </div>

        <div class="content-card">
            <h2 style="text-align: center; margin-bottom: 30px;">Наши работы</h2>

            <div class="gallery-tabs">
                <button class="gallery-tab active" onclick="filterGallery('all')">Все</button>
                <button class="gallery-tab" onclick="filterGallery('tonirovka')">Тонировка</button>
                <button class="gallery-tab" onclick="filterGallery('himchistka')">Химчистка</button>
                <button class="gallery-tab" onclick="filterGallery('polirovka')">Полировка фар</button>
                <button class="gallery-tab" onclick="filterGallery('pokraska')">Покраска</button>
            </div>

            <!-- Галерея будет заполнена автоматически из images.js -->
            <div class="gallery-grid" id="gallery-grid"></div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        </div>

        <!-- Основное модальное окно (галерея) -->
        <div id="modal" class="modal" onclick="closeModal(event)">
            <div class="modal-content">
                <span class="close-modal" onclick="closeModal(event)">&times;</span>
                <div id="modal-images" class="modal-images"></div>
                <div id="modal-caption" class="modal-caption"></div>
            </div>
        </div>

        <!-- Модальное окно для увеличенного фото -->
        <div id="zoomModal" class="zoom-modal" onclick="closeZoomModal(event)">
            <div class="zoom-content">
                <span class="close-zoom" onclick="closeZoomModal(event)">&times;</span>
                <img id="zoomImage" src="" alt="">
                <div id="zoomCaption" class="zoom-caption"></div>
            </div>
        </div>

        <div class="footer-note"
            style="text-align: center; margin-top: 40px; padding: 20px 0; border-top: 1px solid #d7e0e9; color: #556f84; font-size: 0.9rem;">
            <i class="fas fa-images" style="margin-right: 6px; color: #0f5b3a;"></i>
            Галерея работ AutoService в Минске
        </div>
    </div>

    <!-- Подключаем данные галереи -->
    <script src="images.js"></script>

    <script>
        // Функция фильтрации
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            const tabs = document.querySelectorAll('.gallery-tab');

            tabs.forEach(tab => {
                if (tab.textContent.toLowerCase().includes(category) || (category === 'all' && tab.textContent === 'Все')) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            items.forEach(item => {
                if (category === 'all' || item.dataset.category === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Функция открытия увеличенного фото
        function openZoom(imgSrc, caption) {
            const zoomModal = document.getElementById('zoomModal');
            const zoomImage = document.getElementById('zoomImage');
            const zoomCaption = document.getElementById('zoomCaption');
            
            zoomImage.src = imgSrc;
            zoomCaption.textContent = caption;
            zoomModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Функция закрытия увеличенного фото
        function closeZoomModal(event) {
            if (event.target === document.getElementById('zoomModal') || event.target.classList.contains('close-zoom')) {
                document.getElementById('zoomModal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Функция открытия модального окна для нескольких пар фото
        function openModal(files, caption) {
            const modal = document.getElementById('modal');
            const modalImages = document.getElementById('modal-images');
            const modalCaption = document.getElementById('modal-caption');

            // Очищаем контейнер
            modalImages.innerHTML = '';

            // Проверяем, что files - это массив
            if (Array.isArray(files)) {
                // Разбиваем на пары (каждые 2 фото - одна пара)
                for (let i = 0; i < files.length; i += 2) {
                    // Создаем контейнер для пары
                    const pairDiv = document.createElement('div');
                    pairDiv.className = 'photo-pair';

                    // Добавляем подписи ДО/ПОСЛЕ для КАЖДОЙ пары
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'pair-label';
                    labelDiv.innerHTML = '<span>🔄 ДО</span><span>✅ ПОСЛЕ</span>';
                    pairDiv.appendChild(labelDiv);

                    // Создаем контейнер для фото в паре
                    const imagesContainer = document.createElement('div');
                    imagesContainer.className = 'images-container';
                    imagesContainer.style.display = 'grid';
                    imagesContainer.style.gridTemplateColumns = '1fr 1fr';
                    imagesContainer.style.gap = '15px';

                    // Добавляем первое фото (ДО) - с возможностью увеличения
                    if (files[i]) {
                        const img1 = document.createElement('img');
                        img1.src = 'img/' + files[i];
                        img1.alt = caption + ' - ДО';
                        img1.onclick = (e) => {
                            e.stopPropagation();
                            openZoom('img/' + files[i], caption + ' - ДО');
                        };
                        imagesContainer.appendChild(img1);
                    }

                    // Добавляем второе фото (ПОСЛЕ) - с возможностью увеличения
                    if (files[i + 1]) {
                        const img2 = document.createElement('img');
                        img2.src = 'img/' + files[i + 1];
                        img2.alt = caption + ' - ПОСЛЕ';
                        img2.onclick = (e) => {
                            e.stopPropagation();
                            openZoom('img/' + files[i + 1], caption + ' - ПОСЛЕ');
                        };
                        imagesContainer.appendChild(img2);
                    }

                    pairDiv.appendChild(imagesContainer);
                    modalImages.appendChild(pairDiv);

                    // Добавляем разделитель между парами (кроме последней)
                    if (i + 2 < files.length) {
                        const divider = document.createElement('div');
                        divider.className = 'pair-divider';
                        divider.textContent = '•••';
                        modalImages.appendChild(divider);
                    }
                }
            }

            modalCaption.textContent = caption;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Функция закрытия основного модального окна
        function closeModal(event) {
            if (event.target === document.getElementById('modal') || event.target.classList.contains('close-modal')) {
                document.getElementById('modal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // Функция отрисовки галереи из images.js
        function renderGallery() {
            const galleryGrid = document.getElementById('gallery-grid');
            galleryGrid.innerHTML = ''; // Очищаем галерею

            // Проходим по всем категориям
            for (const [category, items] of Object.entries(galleryImages)) {
                items.forEach((item, index) => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item';
                    galleryItem.dataset.category = category;

                    // Используем первое фото как превью
                    const previewFile = item.files[0];
                    galleryItem.onclick = () => openModal(item.files, item.caption);

                    // Добавляем иконку фотоаппарата для пар "до/после"
                    const photoIcon = item.files.length > 2 ? ' 📸📸' : (item.files.length === 2 ? ' 📸' : '');

                    galleryItem.innerHTML = `
                        <img src="img/${previewFile}" alt="${item.caption}">
                        <p>${item.caption}${photoIcon}</p>
                    `;

                    galleryGrid.appendChild(galleryItem);
                });
            }

            // Показываем все фото
            filterGallery('all');
        }

        // Запускаем отрисовку при загрузке страницы
        renderGallery();
    </script>
</body>

</html>
